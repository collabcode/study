<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Science with Gen AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="topbar">
  <h1>Data Science with Gen AI</h1>
  <p>Self-paced learning path inspired by Innomatics curriculum + modern GenAI stack</p>
  <a href="index.html">← Back to streams</a>
</header>
<main class="container layout">
  <aside class="card">
    <h2>Course Roadmap</h2>
    <div class="progress" aria-label="Course progress"><div id="progressBar"></div></div>
    <p id="progressText">0% completed</p>
    <ul id="stepList" class="step-list"></ul>
  </aside>

  <section class="card">
    <h2 id="stepTitle"></h2>
    <p id="stepGoal"></p>

    <div class="tabs" role="tablist" aria-label="Topic sections">
      <button class="tab active" data-tab="learn" role="tab">Learn</button>
      <button class="tab" data-tab="watch" role="tab">Watch</button>
      <button class="tab" data-tab="quiz" role="tab">Quiz</button>
    </div>

    <div id="panel-learn" class="tab-panel active" role="tabpanel">
      <h3>Concepts</h3>
      <div id="stepLearnText"></div>
      <h3>Key Notes</h3>
      <ul id="stepNotes"></ul>
    </div>

    <div id="panel-watch" class="tab-panel" role="tabpanel">
      <h3>Embedded Video</h3>
      <div class="video-wrap">
        <iframe id="ytPlayer" src="" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>
      <h4>More recommended videos</h4>
      <div id="stepVideos" class="links"></div>
    </div>

    <div id="panel-quiz" class="tab-panel" role="tabpanel">
      <h3>Quick Quiz</h3>
      <div id="stepQuiz" class="quiz"></div>
      <button id="markDone">Mark topic as done</button>
    </div>

    <div class="wizard-nav">
      <button id="prevBtn">← Previous</button>
      <button id="nextBtn">Next →</button>
    </div>
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
